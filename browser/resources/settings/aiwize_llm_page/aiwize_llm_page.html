<link rel="stylesheet" href="chrome://resources/brave/leo/css/variables.css">
<style include="settings-shared md-select iron-flex">
  .start-llm {
      cursor: pointer;
      color: blue;
  }

</style>
<div class="settings-box " on-click="onStartLLM_" hidden="[[isLLMStarted_()]]">
  <div class="flex cr-padded-text start-llm">
    <div>$i18n{aiWizeLLMStartLabel}</div>
  </div>
</div>
<div class="settings-box " on-click="onStopLLM_" hidden="[[!isLLMStarted_()]]">
  <div class="flex cr-padded-text start-llm">
    <div>$i18n{aiWizeLLMStopLabel}</div>
  </div>
</div>
<settings-toggle-button class="cr-row hr"
  pref="{{prefs.aiwize_llm.use_gpu}}"
  label="$i18n{aiWizeLLMUseGPULabel}"
  sub-label="$i18n{aiWizeLLMUseGPUDesc}">
</settings-toggle-button>
