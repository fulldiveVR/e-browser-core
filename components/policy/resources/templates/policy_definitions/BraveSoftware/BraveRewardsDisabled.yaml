caption: Disable TauBrowser Rewards
default: null
desc: |-
  Disable TauBrowser Rewards in TauBrowser.

  TauBrowser Rewards is a feature that allows users to get paid for ads they see in TauBrowser and send contributions to their favorite websites and content creators.

            If this policy is set to true, TauBrowser Rewards will always be disabled.

            If this policy is set to false, TauBrowser Rewards will always be enabled.

            If you set this policy, users cannot change or override it.

            If this policy is left unset, TauBrowser Rewards will be enabled by default.
example_value: true
features:
  can_be_mandatory: true
  can_be_recommended: false
  dynamic_refresh: false
  per_profile: true
items:
- caption: Enable TauBrowser Rewards
  value: false
- caption: Disable TauBrowser Rewards
  value: true
- caption: Allow the user to decide
  value: null
