caption: Disable TauBrowser VPN
default: null
desc: |-
  Disable TauBrowser VPN in TauBrowser.

  Allows users to use TauBrowser VPN to block trackers and encrypt every connection to the Web, on every app, even outside the TauBrowser browser.

            If this policy is set to true, TauBrowser VPN will always be disabled.

            If this policy is set to false, TauBrowser VPN will always be enabled.

            If you set this policy, users cannot change or override it.

            If this policy is left unset, TauBrowser VPN will be enabled by default.
example_value: true
features:
  can_be_mandatory: true
  can_be_recommended: false
  dynamic_refresh: false
  per_profile: true
items:
- caption: Enable TauBrowser VPN
  value: false
- caption: Disable TauBrowser VPN
  value: true
- caption: Allow the user to decide
  value: null
