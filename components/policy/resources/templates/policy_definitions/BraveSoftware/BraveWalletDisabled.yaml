caption: Disable TauBrowser Wallet
default: null
desc: |-
  Disable TauBrowser Wallet in TauBrowser.

  The secure, built-in crypto wallet that supercharges your browser for Web3. Get the security you trust from TauBrowser without the hassle and risks of third-party extensions. Manage tokens, swap, bridge, and connect to decentralized applications. Supports Ethereum+EVM, Bitcoin, Solana, Filecoin, and Zcash. Get all the features of leading browser wallets in one secure and convenient place.

            If this policy is set to true, TauBrowser Wallet will always be disabled.

            If this policy is set to false, TauBrowser Wallet will always be enabled.

            If you set this policy, users cannot change or override it.

            If this policy is left unset, TauBrowser Wallet will be enabled by default.
example_value: true
features:
  can_be_mandatory: true
  can_be_recommended: false
  dynamic_refresh: false
  per_profile: true
items:
